name: RELEASE 
on:
  push:
    tags: 
      - "v*.*.*"
      
jobs:
  generate-changelog:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the Code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Generate the Changelog
      - name: Generate Changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          #!/bin/bash

          # Determine Previous and Current Tags
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -vE '(-alpha|-beta|-rc)' | head -n 2 | tail -n 1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          if [ -z "$CURRENT_TAG" ]; then
            echo "Error: CURRENT_TAG is empty. Exiting..."
            exit 1
          fi

          echo "Generating changelog from $PREVIOUS_TAG to $CURRENT_TAG"

          # Initialize changelog with the current tag as the version
          TEMP_FILE=$(mktemp)
          echo "## $CURRENT_TAG" > $TEMP_FILE
          echo "" >> $TEMP_FILE

          # Function to add section if commits exist
          add_section() {
            local section_title="$1"
            local grep_pattern="$2"
            local commits=$(git log $PREVIOUS_TAG..$CURRENT_TAG --grep="$grep_pattern" --pretty=format:'* [`%h`](https://github.com/Shebyyy/Dartotsu/commit/%h): %s')

            if [ ! -z "$commits" ]; then
              echo "### $section_title" >> $TEMP_FILE
              echo "$commits" >> $TEMP_FILE
              echo "" >> $TEMP_FILE
            fi
          }

          # Add sections dynamically
          add_section "🎉 New Features" "^feat:"
          add_section "🛠️ Bug Fixes & Improvements" "^fix:"
          add_section "🔧 Refactors" "^refactor:"
          add_section "🎨 Style Changes" "^style:"
          add_section "🚀 Performance Improvements" "^perf:"
          add_section "🧹 Chores & Documentation" "^(chore|docs):"

          # Append to existing CHANGELOG.md while preserving history
          if [ -f CHANGELOG.md ]; then
            cat CHANGELOG.md >> $TEMP_FILE
          fi
          mv $TEMP_FILE CHANGELOG.md

          # Output the generated changelog for debugging
          cat CHANGELOG.md

      # Step 3: Commit and Push the Changelog
      - name: Commit and Push Changelog
        run: |
          if git diff --quiet CHANGELOG.md; then
            echo "No changes in CHANGELOG.md. Skipping commit."
          else
            echo "Committing and pushing changelog..."
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add CHANGELOG.md
            git commit -m "Update changelog for version $CURRENT_TAG"
            git push origin main
          fi

      # Step 4: Create or Update Release
      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          bodyFile: CHANGELOG.md
          tag: ${{ github.ref#refs/tags/ }}  # Correct the tag reference
          allowUpdates: true

          
  build_android:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'
      - name: Cloing repository
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.1
      - run: flutter pub get
      - run: flutter build apk
      - run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/Dantotsu_Android_${{github.ref_name}}.apk
      - name: Android Apk Release
        uses: softprops/action-gh-release@master
        with:
            files: build/app/outputs/flutter-apk/Dantotsu_Android_${{github.ref_name}}.apk
  build_windows:
    runs-on: windows-latest
    permissions: 
        contents: write
        pull-requests: write
        repository-projects: write
    steps:
      - name: Cloing repository
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.1
      - run: flutter pub get
      - run: flutter build windows
      - name: Archive App
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: Dantotsu_Windows_${{github.ref_name}}.zip
          directory: build\windows\x64\runner\Release
      - run: ls build\windows\x64\runner\Release
      - name: Release Windows Zip
        uses: softprops/action-gh-release@master
        with:
            files: build/windows/x64/runner/Release/Dantotsu_Windows_${{github.ref_name}}.zip
        
    
  build_linux:
    runs-on: ubuntu-latest
    permissions: 
        contents: write
        pull-requests: write
        repository-projects: write
    steps:
      - name: Cloing repository
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.1
      - run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter pub get
      - run: flutter build linux
      - name: Archive app
        uses: thedoctor0/zip-release@master
        with:
            type: 'zip'
            filename: Dantotsu_Linux_${{github.ref_name}}.zip
            directory: build/linux/x64/release/bundle
      - name: Release Linux Zip
        uses: softprops/action-gh-release@master
        with:
            files: build/linux/x64/release/bundle/Dantotsu_Linux_${{github.ref_name}}.zip
  build_ios_and_macos:
    runs-on: macos-latest
    permissions: 
        contents: write
        pull-requests: write
        repository-projects: write
    steps:
      - name: Cloing repository
        uses: actions/checkout@v4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.1
      - run: flutter pub get
      - run: flutter build ios --release --no-codesign
      - name: Release ios App
        uses: softprops/action-gh-release@master
        with:
            files: build/ios/iphoneos/Runner.app
      - run: flutter build macos
      - name: Archive App
        uses: thedoctor0/zip-release@master
        with:
            type: 'zip'
            filename: Dantotsu_MacOS_${{github.ref_name}}.zip
            directory: build/macos/Build/Products/Release
      - name: Release MacOS Zip
        uses: softprops/action-gh-release@master
        with:
            files: build/macos/Build/Products/Release/Dantotsu_MacOS_${{github.ref_name}}.zip
  upload_download_url:
    runs-on: ubuntu-latest
    needs: [build_android,build_windows,build_linux,build_ios_and_macos]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install GitHub CLI
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-key C99B11DEB97541F0
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate GitHub CLI
        run: echo "${{secrets.FINE_GRAIN_TOKEN}}" | gh auth login --with-token

      - name: Fetch latest release assets with gh
        id: fetch_assets
        run: |
          gh release view --repo ${{github.repository}} ${{github.ref_name}} --json assets --jq '.assets[].url' > asset_links.txt

      - name: Print fetched List
        run: cat asset_links.txt

      - name: Read, sort, and format links from the file
        id: format_links
        run: |
          # Read links from the file
          LINKS=$(cat asset_links.txt | sort)
          
          # Initialize the message
          MESSAGE="**Dantotsu ${{github.ref_name}} Downloads:**\n\n"
          
          # Loop through each link and format them
          while IFS= read -r LINK; do
            if [[ $LINK == *"Android"* ]]; then
              MESSAGE+="• [Android]($LINK)\n"
            elif [[ $LINK == *"IOS"* ]]; then
              MESSAGE+="• [iOS]($LINK)\n"
            elif [[ $LINK == *"Linux"* ]]; then
              MESSAGE+="• [Linux]($LINK)\n"
            elif [[ $LINK == *"MacOS"* ]]; then
              MESSAGE+="• [macOS]($LINK)\n"
            elif [[ $LINK == *"Windows"* ]]; then
              MESSAGE+="• [Windows]($LINK)\n"
            fi
          done <<< "$LINKS"

          # Save the message to an environment variable
          echo "MESSAGE=$MESSAGE" >> $GITHUB_ENV
      - name: Send message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MESSAGE: ${{ env.MESSAGE }}
        run: |
          # Send the message to Discord using the webhook
          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{\"content\": \"$MESSAGE\"}" \
            $DISCORD_WEBHOOK_URL
          
