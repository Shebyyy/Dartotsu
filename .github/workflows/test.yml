name: test for workflow
on:
  push:
    branches:
      - main
jobs:
    notes:
        runs-on: ubuntu-latest
        steps:
          - name: Cloning repository
            uses: actions/checkout@v4
            with:
              fetch-depth: 0

          - name: Get Latest Release Notes
            id: get_release_notes
            run: |
                RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/releases/latest")

                RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
                echo "Release Notes: $RELEASE_NOTES"
                
                echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
                echo "$RELEASE_NOTES" >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV

          - name: Format Release Notes into Separate Files
            id: format_notes
            run: |
                echo "🚀 Features" > features.txt
                echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s[a-f0-9]+.*:\sfeat' | head -n 5 || echo 'None')" >> features.txt

                echo "🐛 Fixes" > fixes.txt
                echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s[a-f0-9]+.*:\sfix' | head -n 5 || echo 'None')" >> fixes.txt

                echo "🛠 Chores" > chores.txt
                echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s[a-f0-9]+.*:\schore' | head -n 5 || echo 'None')" >> chores.txt

          - name: Format Each Section with Blockquote
            id: format_sections
            run: |
                format_section() {
                    section_name=$1
                    file_name=$2
                    echo "<b>${section_name}</b>" > formatted_$file_name
                    while IFS= read -r line; do
                        echo "<blockquote>${line}</blockquote>" >> formatted_$file_name
                    done < $file_name
                }

                format_section "🚀 Features" "features.txt"
                format_section "🐛 Fixes" "fixes.txt"
                format_section "🛠 Chores" "chores.txt"

          - name: Process Formatted Notes with tel_parser.sed
            id: process_notes
            run: |
                chmod +x scripts/tel_parser.sed
                
                for file in formatted_features.txt formatted_fixes.txt formatted_chores.txt; do
                    ./scripts/tel_parser.sed "$file" >> processed_$file
                done

                TELEGRAM_MESSAGE=$(cat processed_formatted_features.txt processed_formatted_fixes.txt processed_formatted_chores.txt)

                echo "TELEGRAM_MESSAGE<<EOF" >> $GITHUB_ENV
                echo "$TELEGRAM_MESSAGE" >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV

          - name: Send message to Telegram
            env:
                TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
                TELEGRAM_TOPIC: ${{ secrets.TELEGRAM_TOPIC }}
            run: |
                curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
                    -d "chat_id=$TELEGRAM_CHAT_ID" \
                    -d "message_thread_id=$TELEGRAM_TOPIC" \
                    -d "text=$TELEGRAM_MESSAGE" \
                    -d "parse_mode=HTML"
