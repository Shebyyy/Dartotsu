name: test for workflow
on:
  push:
    branches:
      - main
jobs:
    notes:
        runs-on: ubuntu-latest
        steps:
          - name: Cloing repository
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
          - name: Get Latest Release Notes
            id: get_release_notes
            run: |
                RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/grayankit/DantotsuRe/releases/latest")
                RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
                echo "Release Notes: $RELEASE_NOTES"
                
                echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
                echo "$RELEASE_NOTES" >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV
          - name: Format Release Notes
            id: format_notes
            run: |
              echo "**🚀 Features**" > formatted_notes.txt
              echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfeat' | head -n 5 || echo 'None')" >> formatted_notes.txt
              echo "" >> formatted_notes.txt
          
              echo "**🐛 Fixes**" >> formatted_notes.txt
              echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfix' | head -n 5 || echo 'None')" >> formatted_notes.txt
              echo "" >> formatted_notes.txt
          
              echo "**🛠 Chores**" >> formatted_notes.txt
              echo "$(echo "$RELEASE_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\schore' | head -n 5 || echo 'None')" >> formatted_notes.txt
              echo "" >> formatted_notes.txt

        
                cat formatted_notes.txt
                FORMATTED_NOTES=$(cat formatted_notes.txt) 
                echo "FORMATTED_NOTES<<EOF" >> $GITHUB_ENV
                echo "$FORMATTED_NOTES" >> $GITHUB_ENV
                echo "EOF" >> $GITHUB_ENV
        
          - name: Send message to Discord
            env:
                DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
            run: |
                FORMATTED_NOTES=$(echo "$FORMATTED_NOTES" | sed -E 's/\): [^:]+:/) :/g')
                # Ensure proper JSON formatting
                JSON_PAYLOAD=$(jq -Rs --arg content "$FORMATTED_NOTES" '{"content": $content}')
                
                # Send the message to Discord using the webhook
                curl -H "Content-Type: application/json" \
                    -X POST \
                    -d "$JSON_PAYLOAD" \
                    $DISCORD_WEBHOOK_URL

          - name: Send message to Telegram
            env:
                TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
                TELEGRAM_TOPIC: ${{ secrets.TELEGRAM_THREAD_ID }}
            run: |
                # Extract Features, Fixes, and Chores into separate files (with cleaning)
                feat_commits=$(echo "$FORMATTED_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfeat' | sed -E 's/\): [^:]+:/) :/g' | head -n 5)
                fixes_commits=$(echo "$FORMATTED_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfix' | sed -E 's/\): [^:]+:/) :/g' | head -n 5)
                chores_commits=$(echo "$FORMATTED_NOTES" | grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\schore' | sed -E 's/\): [^:]+:/) :/g' | head -n 5)
          
                # Ensure the script is executable
                chmod +x scripts/tel_parser.sed
          
                # Process only if there are commits in the respective section
                final_message=""
          
                if [ -n "$feat_commits" ]; then
                    echo "**🚀 Features**" > feat.txt
                    echo "$feat_commits" >> feat.txt
                    ./scripts/tel_parser.sed feat.txt > feat_parsed.txt
                    feat_block="<blockquote>$(cat feat_parsed.txt)</blockquote>"
                    final_message+="**🚀 Features** $feat_block "
                fi
          
                if [ -n "$fixes_commits" ]; then
                    echo "**🐛 Fixes**" > fixes.txt
                    echo "$fixes_commits" >> fixes.txt
                    ./scripts/tel_parser.sed fixes.txt > fixes_parsed.txt
                    fixes_block="<blockquote>$(cat fixes_parsed.txt)</blockquote>"
                    final_message+="**🐛 Fixes** $fixes_block "
                fi
          
                if [ -n "$chores_commits" ]; then
                    echo "**🛠 Chores**" > chores.txt
                    echo "$chores_commits" >> chores.txt
                    ./scripts/tel_parser.sed chores.txt > chores_parsed.txt
                    chores_block="<blockquote>$(cat chores_parsed.txt)</blockquote>"
                    final_message+="**🛠 Chores** $chores_block"
                fi
          
                # If no commits exist, don't send an empty message
                if [ -z "$final_message" ]; then
                    echo "No commits found. Skipping Telegram message."
                    exit 0
                fi
          
                echo "Final Telegram Message:"
                echo "$final_message"
          
                # Send message to Telegram
                curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
                    -d "chat_id=$TELEGRAM_CHAT_ID" \
                    -d "message_thread_id=$TELEGRAM_TOPIC" \
                    -d "text=$final_message" \
                    -d "parse_mode=HTML" \
                    -d "disable_web_page_preview=true"
