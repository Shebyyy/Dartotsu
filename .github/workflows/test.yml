name: test for workflow
on:
  push:
    branches:
      - main

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - name: Get Latest Release Notes
        id: get_release_notes
        run: |
          RELEASE_DATA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "https://api.github.com/repos/grayankit/DantotsuRe/releases/latest")

          RELEASE_NOTES=$(echo "$RELEASE_DATA" | jq -r '.body')
          echo "Release Notes: $RELEASE_NOTES"

          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Format Release Notes
        id: format_notes
        run: |
          {
            echo "**🚀 Features**"
            grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfeat' <<< "$RELEASE_NOTES" | head -n 5 | sed -E 's/(\*\s\[[a-f0-9]+\]\(.*\)):\s[^:]+:\s/\1 : /g' || echo "None"
            echo ""

            echo "**🐛 Fixes**"
            grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\sfix' <<< "$RELEASE_NOTES" | head -n 5 | sed -E 's/(\*\s\[[a-f0-9]+\]\(.*\)):\s[^:]+:\s/\1 : /g' || echo "None"
            echo ""

            echo "**🛠 Chores**"
            grep -iE '^\*\s\[[a-f0-9]+\]\(.*\):\schore' <<< "$RELEASE_NOTES" | head -n 5 | sed -E 's/(\*\s\[[a-f0-9]+\]\(.*\)):\s[^:]+:\s/\1 : /g' || echo "None"
            echo ""
          } > formatted_notes.txt

          cat formatted_notes.txt

          FORMATTED_NOTES=$(cat formatted_notes.txt)
          echo "FORMATTED_NOTES<<EOF" >> $GITHUB_ENV
          echo "$FORMATTED_NOTES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Release Notes to Telegram
        run: |
            # Format headings properly (**Bold**)
            commit=$(echo "$FORMATTED_NOTES" | sed -E 's/^###[[:space:]]*(.*)$/\*\*\1\*\*/g')
            
            # Remove extra blank lines
            commit=$(echo "$commit" | awk 'BEGIN {prev=""} {if (NF == 0) {if (prev != "") print ""; prev=""} else {print; prev=$0}}')
            
            # Replace list markers for better readability
            commit=$(echo "$commit" | sed 's/^* /🔹 /g')
            commit=$(echo "$commit" | sed 's/^> /🔹 /g')
            
            # Fix commit formatting: "):" → ") :"
            tel_commit=$(echo "$commit" | sed -E 's/\): [^:]+:/) :/g')
            
            # Escape Markdown characters, but **preserve bold text**
            ESCAPED_MESSAGE=$(echo "$tel_commit" | sed -E \
                -e 's/([_[\]()])/\\\1/g' \  # Escape [, ], (, )
                -e 's/(?<!\*)\*(?!\*)/\\*/g')  # Escape single * but not **bold**
            
            # Send message to Telegram using Markdown
            curl -X POST "https://api.telegram.org/bot***/sendMessage" \
              -H "Content-Type: application/json" \
              -d @<(jq -n --arg chat_id "***" \
                            --arg thread_id "***" \
                            --arg text "$ESCAPED_MESSAGE" \
                            '{ "chat_id": $chat_id, "message_thread_id": $thread_id, "text": $text, "parse_mode": "Markdown", "disable_web_page_preview": true }')
